version: "3.8"

services:
  mysql-container:
    image: mysql:8
    container_name: mysql-container
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sitdemo

    ports:
      - "3307:3306"

    volumes:
      - mysql-data:/var/lib/mysql

    networks:
      - user-network

  backend:
    build: ./UserManagementSystem
    container_name: user-backend
    restart: always

    ports:
      - "8082:8082"

    environment:
      SPRING_PROFILES_ACTIVE: docker

    depends_on:
      - mysql-container

    networks:
      - user-network

  frontend:
    build: ./user-frontend
    container_name: user-frontend
    restart: always

    ports:
      - "3000:3000"

    stdin_open: true
    tty: true

    depends_on:
      - backend

    networks:
      - user-network

volumes:
  mysql-data:

networks:
  user-network:
    driver: bridge